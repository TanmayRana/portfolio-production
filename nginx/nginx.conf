worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream next_backend {
        least_conn;
        server next1:3000;
        server next2:3000;
    }

    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=my_cache:20m
        max_size=1g
        inactive=60m;

    server {
        listen 80;
        server_name _;

        # Gzip compression
        gzip on;
        gzip_disable "msie6";
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_buffers 16 8k;
        gzip_http_version 1.1;
        gzip_types
            text/plain
            text/css
            application/json
            application/javascript
            text/xml
            application/xml
            application/xml+rss
            text/javascript;

        # Healthcheck endpoint
        location /health {
            proxy_pass http://next_backend/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # Cache static next.js assets
        location /_next/static/ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000, immutable";
            proxy_pass http://next_backend;
        }

        # Cache standard public files (images, favicon, etc)
        location ~* \.(?:ico|gif|jpe?g|png|woff2?|eot|otf|ttf|svg)$ {
            expires 15d;
            access_log off;
            add_header Cache-Control "public, max-age=1296000, must-revalidate";
            proxy_pass http://next_backend;
        }

        # Default route with caching
        location / {
            proxy_cache my_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://next_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
